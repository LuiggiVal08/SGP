server {
    listen 80;
    server_name localhost;

    # Redirigir /api al backend de NestJS
    location /api/ {
        proxy_pass http://sgp_api_backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirigir todo lo demás al frontend de Vite
    location / {
        proxy_pass http://sgp_frontend_dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
